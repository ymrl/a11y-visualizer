name: Release Workflow

# Release flow (see RELEASE.md for details):
# 1. Feature PRs include changeset files (created with `pnpm changeset`).
# 2. On every push to main, the changesets job creates or updates the
#    "Version Packages" PR, which applies pending changesets to package
#    versions and changelogs.
# 3. Because that PR is created with GITHUB_TOKEN, it does not trigger the
#    normal PR workflows. The lint / test / build / build_website jobs below
#    run against its head commit and report commit statuses instead.
# 4. When the "Version Packages" PR is merged, main no longer has pending
#    changesets. If the browser extension version has no v* tag yet, the
#    release job builds the extension zips and creates a draft GitHub
#    Release with the artifacts attached.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  changesets:
    runs-on: ubuntu-latest

    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      versionPrSha: ${{ steps.version_pr_sha.outputs.SHA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version Packages PR head SHA
        id: version_pr_sha
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          git fetch origin changeset-release/main
          echo "SHA=$(git rev-parse origin/changeset-release/main)" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Set Commit Status Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending
          context: lint
          description: "Running lint"
          sha: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint

      - name: Set Commit Status
        uses: myrotvorets/set-commit-status-action@v2.0.1
        if: ${{ always() }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          context: lint
          sha: ${{ needs.changesets.outputs.versionPrSha }}

  test:
    runs-on: ubuntu-latest
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Set Commit Status Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending
          context: test
          description: "Running test"
          sha: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Get installed Playwright version
        id: playwright_version
        run: echo VERSION="$(pnpm exec playwright --version | sed 's/Version //g')" >> $GITHUB_OUTPUT

      - name: Cache playwright binaries
        uses: actions/cache@v4
        id: playwright_cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.VERSION }}

      - run: pnpm install-playwright
        if: steps.playwright_cache.outputs.cache-hit != 'true'

      - name: Run test
        run: pnpm test

      - name: Set Commit Status
        uses: myrotvorets/set-commit-status-action@v2.0.1
        if: ${{ always() }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          context: test
          sha: ${{ needs.changesets.outputs.versionPrSha }}

  build:
    runs-on: ubuntu-latest
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Set Commit Status Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending
          context: build
          description: "Running build"
          sha: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build for Chrome
        run: pnpm build

      - name: Build for Firefox
        run: pnpm build:firefox

      - name: Set Commit Status
        uses: myrotvorets/set-commit-status-action@v2.0.1
        if: ${{ always() }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          context: build
          sha: ${{ needs.changesets.outputs.versionPrSha }}

  build_website:
    runs-on: ubuntu-latest
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Set Commit Status Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending
          context: build_website
          description: "Running website build"
          sha: ${{ needs.changesets.outputs.versionPrSha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build website
        run: pnpm build:website

      - name: Set Commit Status
        uses: myrotvorets/set-commit-status-action@v2.0.1
        if: ${{ always() }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          context: build_website
          sha: ${{ needs.changesets.outputs.versionPrSha }}

  check_release:
    runs-on: ubuntu-latest
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'false'

    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      TAG_EXISTS: ${{ steps.check_tag.outputs.TAG_EXISTS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get browser extension version
        id: get_version
        run: echo "VERSION=$(jq -r .version apps/browser_extension/package.json)" >> $GITHUB_OUTPUT

      - name: Check whether the release tag already exists
        id: check_tag
        run: |
          if git ls-remote --exit-code origin "refs/tags/v${{ steps.get_version.outputs.VERSION }}" > /dev/null; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: check_release
    if: needs.check_release.outputs.TAG_EXISTS == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Package
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "apps/browser_extension/dist/a11y-visualizer-*.zip"
          generateReleaseNotes: true
          name: "Release v${{ needs.check_release.outputs.VERSION }}"
          tag: v${{ needs.check_release.outputs.VERSION }}
          commit: ${{ github.sha }}
          draft: true
